<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>道場QR読み取り実験 T0529_1</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 22px;
      margin-top: 0;
    }
    .card {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 12px auto;
      background: #fff;
    }
    button {
      font-size: 16px;
      padding: 10px 14px;
      margin: 4px;
    }
    .ok {
      color: green;
      font-weight: bold;
    }
    .warn {
      color: #c47a00;
      font-weight: bold;
    }
    .latest {
      font-size: 18px;
      font-weight: bold;
      word-break: break-all;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>
  <h1>道場QR読み取り実験</h1>

  <div class="card">
    <div>保持中の道場ID</div>
    <div id="locationId" class="warn">未設定</div>
  </div>

  <div class="card">
    <div id="reader"></div>

    <button onclick="startScan()">読み取り開始</button>
    <button onclick="stopScan()">停止</button>
    <button onclick="clearLog()">ログ消去</button>
  </div>

  <div class="card">
    <div>最新読み取り</div>
    <div id="latest" class="latest">なし</div>
  </div>

  <div class="card">
    <div>読み取りログ</div>
    <ul id="log"></ul>
  </div>

  <script>
    let html5QrCode = null;
    let scanning = false;

    let currentLocationId = "";
    let lastText = "";
    let lastReadTime = 0;

    function startScan() {
      if (scanning) return;

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      };

      html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanFailure
      ).then(() => {
        scanning = true;
        addLog("カメラ起動成功");
      }).catch(err => {
        addLog("カメラ起動エラー: " + err);
      });
    }

    function stopScan() {
      if (!html5QrCode || !scanning) return;

      html5QrCode.stop().then(() => {
        scanning = false;
        addLog("読み取り停止");
      }).catch(err => {
        addLog("停止エラー: " + err);
      });
    }

    function onScanSuccess(decodedText) {
      const now = Date.now();

      // 同じQRの連続検出を2秒抑止
      if (decodedText === lastText && now - lastReadTime < 2000) {
        return;
      }

      lastText = decodedText;
      lastReadTime = now;

      document.getElementById("latest").textContent = decodedText;

      const parsed = parseQrText(decodedText);

      if (parsed.location_id) {
        currentLocationId = parsed.location_id;
        document.getElementById("locationId").textContent = currentLocationId;
        document.getElementById("locationId").className = "ok";
        addLog("道場QR読取: " + currentLocationId);
        beep();
        return;
      }

      if (parsed.member_id) {
        addLog("会員QR読取: " + parsed.member_id + " / location=" + (currentLocationId || "未設定"));
        beep();
        return;
      }

      addLog("未分類QR: " + decodedText);
      beep();
    }

    function onScanFailure(error) {
      // 毎フレーム失敗するのでログ出力しない
    }

    function parseQrText(text) {
      const result = {
        location_id: "",
        member_id: ""
      };

      // URL形式: https://example.com?member_id=M001
      try {
        const url = new URL(text);
        result.location_id = url.searchParams.get("location_id") || "";
        result.member_id = url.searchParams.get("member_id") || "";
        return result;
      } catch (e) {
        // URLでない場合は下へ
      }

      // 文字列形式: location_id=LOC001
      if (text.startsWith("location_id=")) {
        result.location_id = text.replace("location_id=", "").trim();
      }

      // 文字列形式: member_id=M001
      if (text.startsWith("member_id=")) {
        result.member_id = text.replace("member_id=", "").trim();
      }

      return result;
    }

    function addLog(message) {
      const li = document.createElement("li");
      const time = new Date().toLocaleTimeString();
      li.textContent = "[" + time + "] " + message;
      document.getElementById("log").prepend(li);
    }

    function clearLog() {
      document.getElementById("log").innerHTML = "";
      document.getElementById("latest").textContent = "なし";
      lastText = "";
      lastReadTime = 0;
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.connect(gain);
        gain.connect(ctx.destination);

        oscillator.frequency.value = 880;
        gain.gain.value = 0.08;

        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.08);
      } catch (e) {
        // 音が出なくても無視
      }

      if (navigator.vibrate) {
        navigator.vibrate(100);
      }
    }
  
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxzLhWNEELA9Og9SSop7XQk3oExDpljb7LiOj3UUimx/dev";

    fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        member_id: parsed.member_id,
        location_id: currentLocationId,
        source: "github_pages_qr_test"
      })
    });

  </script>
</body>
</html>
